<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古堡留聲機 - 完整音樂館</title>
    <style>
        /* --- 視覺風格：古老城堡 --- */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #3d3d3d 0%, #0d0d0d 100%);
            color: #4a3728;
            font-family: "Times New Roman", serif;
        }

        /* 播放器容器：羊皮紙質感 */
        .player-container {
            background: #c3a683; 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.2);
            border: 8px double #5d4037;
            text-align: center;
            width: 400px;
            transition: all 0.5s ease;
        }

        .vintage-frame {
            border: 1px solid #5d4037;
            padding: 20px;
        }

        h2 {
            font-variant: small-caps;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #3e2723;
        }

        /* 歌曲清單區域 */
        .playlist-wrapper {
            margin-top: 20px;
            text-align: left;
        }

        .playlist {
            max-height: 180px;
            overflow-y: auto;
            border: 1px inset #5d4037;
            padding: 10px;
            background: rgba(0, 0, 0, 0.05);
            margin-bottom: 15px;
        }

        .playlist-item {
            cursor: pointer;
            padding: 8px;
            border-bottom: 1px solid rgba(93, 64, 55, 0.2);
            font-size: 0.9em;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item:hover {
            background: rgba(93, 64, 55, 0.1);
        }

        .playlist-item.active {
            font-weight: bold;
            color: #8d1c1c;
            background: rgba(93, 64, 55, 0.15);
        }

        /* 控制按鈕 */
        .controls {
            margin: 15px 0;
        }

        .castle-btn {
            background: #5d4037;
            color: #c3a683;
            border: 1px solid #3e2723;
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
        }

        .castle-btn:hover {
            background: #3e2723;
            box-shadow: 0 0 10px #8d6e63;
        }

        /* 進度條樣式 */
        .progress-container {
            margin: 15px 0;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #5d4037;
        }

        /* 滾動條美化 (Chrome/Edge) */
        .playlist::-webkit-scrollbar { width: 5px; }
        .playlist::-webkit-scrollbar-thumb { background: #5d4037; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="vintage-frame">
        <h2 id="song-title">城堡留聲機</h2>
        <p id="song-status">請開啟密藏資料夾</p>
        
        <audio id="audio-player"></audio>

        <div class="progress-container">
            <input type="range" id="progress-bar" value="0" max="100">
        </div>

        <div class="controls">
            <button id="prev" class="castle-btn">«</button>
            <button id="play-pause" class="castle-btn">開始演奏</button>
            <button id="next" class="castle-btn">»</button>
        </div>

        <label for="file-upload" class="castle-btn" style="font-size: 0.8em;">開啟地下室密藏 (多選 MP3)</label>
        <input type="file" id="file-upload" multiple accept="audio/*" style="display:none;">

        <div class="playlist-wrapper">
            <div class="playlist" id="playlist">
                <div style="text-align: center; color: #888; font-style: italic;">尚未載入樂章...</div>
            </div>
        </div>
    </div>
</div>

<script>
    /* --- 邏輯說明 ---
       由於瀏覽器安全限制，前端無法直接掃描資料夾。
       我們透過 input file (multiple) 讓使用者選取 music 資料夾內的所有檔案，
       並用 URL.createObjectURL 建立虛擬路徑來播放。
    ------------------- */

    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const songTitleText = document.getElementById('song-title');
    const statusText = document.getElementById('song-status');
    const playlistContainer = document.getElementById('playlist');
    const fileUpload = document.getElementById('file-upload');

    let songs = []; // 存放檔案物件
    let currentSongIndex = 0;

    // 1. 處理檔案選取
    fileUpload.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        songs = files;
        renderPlaylist();
        loadSong(0); // 載入第一首
    });

    // 2. 生成播放清單 UI
    function renderPlaylist() {
        playlistContainer.innerHTML = '';
        songs.forEach((file, index) => {
            const item = document.createElement('div');
            item.classList.add('playlist-item');
            // 去除副檔名顯示
            const displayName = file.name.replace(/\.[^/.]+$/, "");
            item.innerText = `${index + 1}. ${displayName}`;
            item.onclick = () => loadSong(index);
            playlistContainer.appendChild(item);
        });
    }

    // 3. 載入並播放歌曲
    function loadSong(index) {
        if (songs.length === 0) return;
        
        currentSongIndex = index;
        const file = songs[index];
        
        // 釋放之前的 URL 記憶體
        if (audio.src) URL.revokeObjectURL(audio.src);
        
        audio.src = URL.createObjectURL(file);
        songTitleText.innerText = file.name.replace(/\.[^/.]+$/, "");
        statusText.innerText = "準備奏樂...";

        // 更新高亮狀態
        const items = document.querySelectorAll('.playlist-item');
        items.forEach((el, i) => el.classList.toggle('active', i === index));

        audio.play().catch(() => {
            statusText.innerText = "點擊按鈕開始演奏";
        });
        playPauseBtn.textContent = '暫停演奏';
    }

    // 4. 控制項：播放/暫停
    playPauseBtn.onclick = () => {
        if (!audio.src) return;
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '暫停演奏';
        } else {
            audio.pause();
            playPauseBtn.textContent = '繼續演奏';
        }
    };

    // 5. 控制項：上一首 & 下一首
    document.getElementById('next').onclick = () => {
        if (songs.length === 0) return;
        let nextIndex = (currentSongIndex + 1) % songs.length;
        loadSong(nextIndex);
    };

    document.getElementById('prev').onclick = () => {
        if (songs.length === 0) return;
        let prevIndex = (currentSongIndex - 1 + songs.length) % songs.length;
        loadSong(prevIndex);
    };

    // 6. 進度條更新
    audio.ontimeupdate = () => {
        if (audio.duration) {
            progressBar.value = (audio.currentTime / audio.duration) * 100;
        }
    };

    progressBar.oninput = () => {
        if (audio.duration) {
            audio.currentTime = (progressBar.value / 100) * audio.duration;
        }
    };

    // 7. 自動下一首
    audio.onended = () => {
        document.getElementById('next').onclick();
    };
</script>

</body>
</html>
