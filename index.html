<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古堡留聲機 - 修正編碼版</title>
    <style>
        /* --- 視覺風格：古老城堡 --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* 背景圖片與暗色遮罩 */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            /* 字體設定：優先使用襯線體營造古風，並加入微軟正黑體備援 */
            color: #4a3728;
            font-family: "Times New Roman", "微軟正黑體", "Microsoft JhengHei", serif;
            overflow: hidden;
        }

        /* 播放器容器 */
        .player-container {
            background: #c3a683; 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
            border: 8px double #5d4037;
            text-align: center;
            width: 350px;
        }

        .vintage-frame {
            border: 1px solid #5d4037;
            padding: 20px;
        }

        h2 {
            font-variant: small-caps;
            letter-spacing: 2px;
            margin: 10px 0;
            color: #3e2723;
        }

        /* 播放清單樣式 */
        .playlist {
            margin-top: 15px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border: 1px inset #5d4037;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
        }

        .playlist-item {
            cursor: pointer;
            padding: 8px;
            border-bottom: 1px solid rgba(93, 64, 55, 0.2);
            font-size: 0.9em;
            transition: 0.2s;
        }

        .playlist-item:hover { background: rgba(93, 64, 55, 0.1); }
        .playlist-item.active { 
            font-weight: bold; 
            color: #8d1c1c; 
            background: rgba(93, 64, 55, 0.15); 
        }

        /* 控制按鈕 */
        .controls { margin: 15px 0; }
        .castle-btn {
            background: #5d4037;
            color: #c3a683;
            border: 1px solid #3e2723;
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.3s;
        }

        .castle-btn:hover {
            background: #3e2723;
            box-shadow: 0 0 8px #8d6e63;
        }

        /* 進度條 */
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #5d4037;
        }

        .status-text {
            font-style: italic;
            font-size: 0.8em;
            margin-top: 10px;
            color: #5d4037;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="vintage-frame">
        <h2 id="song-title">古堡秘藏</h2>
        <p id="song-artist" style="font-size: 0.8em;">讀取 GitHub 馆藏中...</p>
        
        <audio id="audio-player"></audio>

        <div class="progress-container">
            <input type="range" id="progress-bar" value="0">
        </div>

        <div class="controls">
            <button id="prev" class="castle-btn">«</button>
            <button id="play-pause" class="castle-btn">開始</button>
            <button id="next" class="castle-btn">»</button>
        </div>

        <div class="playlist" id="playlist"></div>
        <p id="status" class="status-text">點擊樂章開始演奏</p>
    </div>
</div>

<script>
    /* --- 歌曲資料設定 (請確保 music 資料夾內檔案名稱正確) --- */
    const songs = [
        { title: "深夜迴廊", file: "song1.mp3" },
        { title: "月光禮拜堂", file: "song2.mp3" },
        { title: "秘室低語", file: "song3.mp3" }
    ];

    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const songTitleText = document.getElementById('song-title');
    const playlistContainer = document.getElementById('playlist');
    const statusText = document.getElementById('status');

    let currentSongIndex = 0;

    // 生成播放清單
    function init() {
        songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.innerText = `${index + 1}. ${song.title}`;
            item.onclick = () => loadSong(index);
            playlistContainer.appendChild(item);
        });
    }

    // 載入歌曲
    function loadSong(index) {
        currentSongIndex = index;
        audio.src = `music/${songs[index].file}`;
        songTitleText.innerText = songs[index].title;
        
        // 更新高亮
        const items = document.querySelectorAll('.playlist-item');
        items.forEach((el, i) => el.classList.toggle('active', i === index));

        audio.play().catch(e => {
            statusText.innerText = "演奏受阻：請點擊按鈕或檢查路徑";
        });
        playPauseBtn.textContent = '暫停';
        statusText.innerText = "正在演奏中...";
    }

    // 播放/暫停控制
    playPauseBtn.onclick = () => {
        if (!audio.src) { loadSong(0); return; }
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '暫停';
            statusText.innerText = "正在演奏中...";
        } else {
            audio.pause();
            playPauseBtn.textContent = '繼續';
            statusText.innerText = "演奏暫停";
        }
    };

    // 上一首/下一首
    document.getElementById('next').onclick = () => loadSong((currentSongIndex + 1) % songs.length);
    document.getElementById('prev').onclick = () => loadSong((currentSongIndex - 1 + songs.length) % songs.length);

    // 進度條同步
    audio.ontimeupdate = () => {
        if (audio.duration) progressBar.value = (audio.currentTime / audio.duration) * 100;
    };

    progressBar.oninput = () => {
        audio.currentTime = (progressBar.value / 100) * audio.duration;
    };

    // 播完自動下一首
    audio.onended = () => document.getElementById('next').onclick();

    init();
</script>
</body>
</html>
