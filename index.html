<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>古堡留聲機 - 訪客留言版</title>
    <style>
        /* --- 全域佈局 --- */
        body {
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('image/1.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #4a3728; font-family: "Times New Roman", "微軟正黑體", serif;
            overflow-x: hidden;
        }

        /* 播放器容器 */
        .player-container {
            background: #c3a683; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 20px; border-radius: 5px; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 6px double #5d4037; text-align: center;
            width: 90%; max-width: 380px; box-sizing: border-box; margin-bottom: 25px;
        }

        /* 留言區容器 - 寬度稍微放寬一點方便閱讀留言 */
        .comment-container {
            background: rgba(195, 166, 131, 0.95); background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 20px; border-radius: 5px; border: 4px double #5d4037;
            width: 90%; max-width: 500px; box-sizing: border-box; margin-bottom: 50px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .vintage-frame { border: 1px solid #5d4037; padding: 15px; }
        h2, h3 { font-variant: small-caps; letter-spacing: 2px; margin: 10px 0; color: #3e2723; }
        
        /* 播放清單樣式 */
        .playlist { margin-top: 15px; text-align: left; max-height: 140px; overflow-y: auto; border: 1px inset #5d4037; background: rgba(0, 0, 0, 0.05); padding: 5px; }
        .playlist-item { cursor: pointer; padding: 10px 8px; border-bottom: 1px solid rgba(93, 64, 55, 0.2); font-size: 0.9em; }
        .playlist-item.active { font-weight: bold; color: #8d1c1c; background: rgba(93, 64, 55, 0.15); }
        
        /* 控制按鈕 */
        .controls { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .castle-btn { background: #5d4037; color: #c3a683; border: 1px solid #3e2723; padding: 10px 0; flex: 1; cursor: pointer; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: #5d4037; }

        .status-text { font-style: italic; font-size: 0.8em; margin-top: 10px; color: #5d4037; }
        
        /* Giscus 容器微調：確保留言板與古堡風格融合 */
        .giscus { margin-top: 20px; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="vintage-frame">
        <h2 id="song-title">古堡秘藏</h2>
        <p style="font-size: 0.7em; margin-top: -5px;">MOBILE OPTIMIZED</p>
        <audio id="audio-player"></audio>
        <div class="progress-container"><input type="range" id="progress-bar" value="0"></div>
        <div class="controls">
            <button id="prev" class="castle-btn">«</button>
            <button id="play-pause" class="castle-btn">開始</button>
            <button id="next" class="castle-btn">»</button>
        </div>
        <div class="playlist" id="playlist"></div>
        <p id="status" class="status-text">準備演奏</p>
    </div>
</div>

<div class="comment-container">
    <div class="vintage-frame">
        <h3>訪客留聲板</h3>
        <p style="font-size: 0.8em; font-style: italic; color: #5d4037; margin-bottom: 15px;">
            您的回響將留存於古堡討論區中...
        </p>

        <div class="giscus"></div>

        <script src="https://giscus.app/client.js"
                data-repo="homeabint/www.flowcloud.store"
                data-repo-id="R_kgDOQ6kWwg"
                data-category="Announcements"
                data-category-id="DIC_kwDOQ6kWws4C7jmP"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="preferred_color_scheme"
                data-lang="zh-TW"
                crossorigin="anonymous"
                async>
        </script>
    </div>
</div>

<script>
    // --- 音樂撥放邏輯 ---
    const songs = [
        { title: "第一首", file: "Suno AI Music.mp3" },
        { title: "第二首", file: "Suno AI Music_1.mp3" },
        { title: "第三首", file: "Suno AI Music_2.mp3" },
        { title: "第四首", file: "Suno AI Music_3.mp3" },
        { title: "第五首", file: "Suno AI Music_4.mp3" },
        { title: "第六首", file: "Suno AI Music_5.mp3" },
        { title: "第七首", file: "Suno AI Music_6.mp3" }
    ];

    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const songTitleText = document.getElementById('song-title');
    const playlistContainer = document.getElementById('playlist');
    const statusText = document.getElementById('status');

    let currentSongIndex = 0;

    function init() {
        songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.innerText = `${index + 1}. ${song.title}`;
            item.onclick = () => loadSong(index);
            playlistContainer.appendChild(item);
        });
    }

    function loadSong(index) {
        currentSongIndex = index;
        audio.src = encodeURI(`music/${songs[index].file}`);
        songTitleText.innerText = songs[index].title;
        document.querySelectorAll('.playlist-item').forEach((el, i) => el.classList.toggle('active', i === index));
        audio.play().then(() => {
            playPauseBtn.textContent = '暫停';
            statusText.innerText = "正在演奏中...";
        }).catch(() => {
            statusText.innerText = "讀取失敗：請檢查路徑";
        });
    }

    playPauseBtn.onclick = () => {
        if (!audio.src) { loadSong(0); return; }
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '暫停';
        } else {
            audio.pause();
            playPauseBtn.textContent = '繼續';
        }
    };

    document.getElementById('next').onclick = () => loadSong((currentSongIndex + 1) % songs.length);
    document.getElementById('prev').onclick = () => loadSong((currentSongIndex - 1 + songs.length) % songs.length);
    audio.ontimeupdate = () => { if (audio.duration) progressBar.value = (audio.currentTime / audio.duration) * 100; };
    progressBar.oninput = () => { audio.currentTime = (progressBar.value / 100) * audio.duration; };
    audio.onended = () => document.getElementById('next').onclick();

    init();
</script>
</body>
</html>
