<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古堡留聲機 - 最終修正版</title>
    <style>
        /* --- 視覺風格：古老城堡 --- */
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #4a3728; font-family: "Times New Roman", "微軟正黑體", serif; overflow: hidden;
        }
        .player-container {
            background: #c3a683; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 30px; border-radius: 5px; box-shadow: 0 0 80px rgba(0,0,0,0.9); border: 8px double #5d4037; text-align: center; width: 350px;
        }
        .vintage-frame { border: 1px solid #5d4037; padding: 20px; }
        h2 { font-variant: small-caps; letter-spacing: 2px; margin: 10px 0; color: #3e2723; }
        .playlist { margin-top: 15px; text-align: left; max-height: 180px; overflow-y: auto; border: 1px inset #5d4037; background: rgba(0, 0, 0, 0.05); padding: 5px; }
        .playlist-item { cursor: pointer; padding: 8px; border-bottom: 1px solid rgba(93, 64, 55, 0.2); font-size: 0.9em; transition: 0.2s; }
        .playlist-item:hover { background: rgba(93, 64, 55, 0.1); }
        .playlist-item.active { font-weight: bold; color: #8d1c1c; background: rgba(93, 64, 55, 0.15); }
        .controls { margin: 15px 0; }
        .castle-btn { background: #5d4037; color: #c3a683; border: 1px solid #3e2723; padding: 8px 15px; margin: 5px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .castle-btn:hover { background: #3e2723; box-shadow: 0 0 8px #8d6e63; }
        input[type="range"] { width: 100%; accent-color: #5d4037; cursor: pointer; }
        .status-text { font-style: italic; font-size: 0.8em; margin-top: 10px; color: #5d4037; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="vintage-frame">
        <h2 id="song-title">古堡秘藏</h2>
        <p id="song-artist" style="font-size: 0.8em;">GitHub 館藏系列</p>
        
        <audio id="audio-player"></audio>

        <div class="progress-container">
            <input type="range" id="progress-bar" value="0">
        </div>

        <div class="controls">
            <button id="prev" class="castle-btn">«</button>
            <button id="play-pause" class="castle-btn">開始</button>
            <button id="next" class="castle-btn">»</button>
        </div>

        <div class="playlist" id="playlist"></div>
        <p id="status" class="status-text">準備演奏</p>
    </div>
</div>

<script>
    // 修正點：補齊物件之間的逗號，並確保檔名與資料夾內一致
        /* --- 修正說明：已將 AI 與 Music 之間的空格統一為 1 個 --- */
    const songs = [
        { title: "第一首", file: "Suno AI Music.mp3" },
        { title: "第二首", file: "Suno AI Music_1.mp3" },
        { title: "第三首", file: "Suno AI Music_2.mp3" },
        { title: "第四首", file: "Suno AI Music_3.mp3" },
        { title: "第五首", file: "Suno AI Music_4.mp3" },
        { title: "第六首", file: "Suno AI Music_5.mp3" },
        { title: "第七首", file: "Suno AI Music_6.mp3" }
    ];

    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const songTitleText = document.getElementById('song-title');
    const playlistContainer = document.getElementById('playlist');
    const statusText = document.getElementById('status');

    let currentSongIndex = 0;

    function init() {
        songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.innerText = `${index + 1}. ${song.title}`;
            item.onclick = () => loadSong(index);
            playlistContainer.appendChild(item);
        });
    }

    function loadSong(index) {
        currentSongIndex = index;
        // 修正點：使用 encodeURI 處理檔名中的空格
        const filePath = `music/${songs[index].file}`;
        audio.src = encodeURI(filePath); 
        
        songTitleText.innerText = songs[index].title;
        
        const items = document.querySelectorAll('.playlist-item');
        items.forEach((el, i) => el.classList.toggle('active', i === index));

        audio.play().then(() => {
            playPauseBtn.textContent = '暫停';
            statusText.innerText = "正在演奏中...";
        }).catch(e => {
            statusText.innerText = "讀取失敗：請檢查 music/ 資料夾與檔名";
            console.error("播放錯誤:", e);
        });
    }

    playPauseBtn.onclick = () => {
        if (!audio.src) { loadSong(0); return; }
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '暫停';
        } else {
            audio.pause();
            playPauseBtn.textContent = '繼續';
        }
    };

    document.getElementById('next').onclick = () => loadSong((currentSongIndex + 1) % songs.length);
    document.getElementById('prev').onclick = () => loadSong((currentSongIndex - 1 + songs.length) % songs.length);

    audio.ontimeupdate = () => {
        if (audio.duration) progressBar.value = (audio.currentTime / audio.duration) * 100;
    };

    progressBar.oninput = () => {
        audio.currentTime = (progressBar.value / 100) * audio.duration;
    };

    audio.onended = () => document.getElementById('next').onclick();

    init();
</script>
</body>
</html>
